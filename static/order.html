<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Items — Flyer Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <style>
    @font-face {
      font-family: 'Bebas Neue';
      src: url('/static/BebasNeue-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Noto Sans SC';
      src: url('/static/NotoSansSC-SemiBold.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Noto Sans SC';
      src: url('/static/NotoSansSC-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    header a:hover { color: white; }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .template-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .template-switcher select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    .main {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 70px);
    }

    /* Left: drag list */
    .list-panel {
      background: white;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
    }

    .list-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .list-header-title {
      font-size: 13px;
      font-weight: 700;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .item-count {
      font-size: 13px;
      color: #bbb;
    }

    .sortable-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sort-item {
      background: #f9f9f7;
      border: 1.5px solid #e8e8e0;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: grab;
      transition: box-shadow 0.15s;
      user-select: none;
    }

    .sort-item:active { cursor: grabbing; }

    .sort-item.sortable-ghost {
      opacity: 0.4;
      background: #fff3f3;
      border-color: #e8312a;
    }

    .sort-item.sortable-drag {
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .drag-handle {
      color: #ccc;
      font-size: 16px;
      flex-shrink: 0;
    }

    .sort-item-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .sort-item-info {
      flex: 1;
      min-width: 0;
    }

    .sort-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sort-item-price {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .sort-item-position {
      font-size: 11px;
      font-weight: 700;
      color: #ccc;
      flex-shrink: 0;
      width: 20px;
      text-align: right;
    }

    /* Right: page preview */
    .preview-panel {
      background: #2a2a2a;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .preview-panel-label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      align-self: flex-start;
    }

    .page-preview {
      background: white;
      border-radius: 4px;
      overflow: hidden;
      width: 100%;
      max-width: 700px;
    }

    .page-label {
      background: #1a1a1a;
      color: #666;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 12px;
    }

    .page-grid {
      display: grid;
      padding: 8px;
      gap: 6px;
    }

    .page-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .page-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

    .grid-cell {
      aspect-ratio: 1;
      background: #f0f0eb;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .grid-cell .cell-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #F5C518;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    text-align: center;
    line-height: 1.1;
    padding: 4px;
  }

    .grid-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .grid-cell .cell-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.92);
      padding: 4px 6px;
    }

    .grid-cell .cell-name {
      font-size: 9px;
      font-weight: 700;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid-cell .cell-price {
      font-size: 9px;
      color: #e8312a;
      font-weight: 700;
    }

    .grid-cell.empty {
      background: #f5f5f0;
      border: 1.5px dashed #ddd;
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e0e0e0;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .save-status {
      font-size: 13px;
      color: #aaa;
    }

    .save-status.saving { color: #e8312a; }
    .save-status.saved { color: #198754; }

    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #e8312a; color: white; }
    .btn-secondary { background: #f0f0eb; color: #1a1a1a; }

    .pb { padding-bottom: 70px; }

    .delete-item-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .delete-item-btn:hover {
    background: #fff0f0;
    color: #e8312a;
  }
  </style>
</head>
<body>

<header>
  <div class="left">
    <a href="/static/editor.html">← Back</a>
    <h1>Arrange Items</h1>
  </div>
  <div class="template-switcher">
    Template:
    <select id="template-select" onchange="switchTemplate(this.value)">
      <option>Loading...</option>
    </select>
  </div>
</header>

<div class="main">

  <!-- Left: sortable list -->
  <div class="list-panel">
    <div class="list-header">
      <span class="list-header-title">Drag to Reorder</span>
      <span class="item-count" id="item-count"></span>
    </div>
    <div class="sortable-list" id="sortable-list"></div>
  </div>

  <!-- Right: page previews -->
  <div class="preview-panel pb">
    <div class="preview-panel-label">Page Preview</div>
    <div id="pages-container"></div>
  </div>

</div>

<div class="bottom-bar">
  <span class="save-status" id="save-status">Drag items to reorder</span>
  <div style="display:flex;gap:10px">
    <button class="btn btn-secondary" onclick="addMoreImages()">+ Add Images</button>
    <button class="btn btn-primary" onclick="continueToNext()">Continue →</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  const projectId = sessionStorage.getItem('project_id');

  let items = [];
  let template = null;
  let saveTimer = null;
  async function init() {
    if (!projectId) {
      window.location.href = '/static/index.html';
      return;
    }

    const projRes = await fetch(`${API}/projects/${projectId}`);
    const project = await projRes.json();

    const tmplRes = await fetch(`${API}/templates/`);
    const templates = await tmplRes.json();
    const select = document.getElementById('template-select');
    select.innerHTML = templates.map(t =>
      `<option value="${t.id}" ${t.id === project.template_id ? 'selected' : ''}>${t.name}</option>`
    ).join('');

    template = templates.find(t => t.id === project.template_id);

    const itemRes = await fetch(`${API}/items/project/${projectId}`);
    items = await itemRes.json();

    document.getElementById('save-status').textContent = 'Rendering cells...';
    document.getElementById('save-status').className = 'save-status saving';

    await fetch(`${API}/export/${projectId}/render_all`, { method: 'POST' });

    const refreshedRes = await fetch(`${API}/items/project/${projectId}`);
    items = await refreshedRes.json();

    document.getElementById('save-status').textContent = 'Ready';
    document.getElementById('save-status').className = 'save-status saved';

    renderList();
    renderPages();
  }

  function renderList() {
    const list = document.getElementById('sortable-list');
    document.getElementById('item-count').textContent = `${items.length} items`;

    list.innerHTML = items.map((item, i) => `
      <div class="sort-item" data-id="${item.id}">
        <span class="drag-handle">⠿</span>
        <img class="sort-item-img"
          src="${API}${item.image ? item.image.url : ''}"
          onerror="this.style.background='#eee'"
          onclick="editItem('${item.library_image_id}')"
          style="cursor:pointer">
        <div class="sort-item-info">
          <div class="sort-item-name">${item.description_en || item.description_zh || 'Untitled'}</div>
          <div class="sort-item-price">${item.price_amount ? '$' + item.price_amount : 'No price'}</div>
        </div>
        <span class="sort-item-position">${i + 1}</span>
        <button class="delete-item-btn" onclick="deleteItem('${item.id}')">✕</button>
      </div>
    `).join('');

    // init SortableJS
    Sortable.create(list, {
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd: onReorder
    });
  }

  function renderPages() {
    if (!template) return;
    const container = document.getElementById('pages-container');
    const cols = template.columns;
    const cellsPerPage = template.cells_per_page;
    const pages = Math.ceil(items.length / cellsPerPage);

    let html = '';
    for (let p = 0; p < pages; p++) {
      const pageItems = items.slice(p * cellsPerPage, (p + 1) * cellsPerPage);
      const cells = [...pageItems];

      while (cells.length < cellsPerPage) cells.push(null);

      html += `
        <div class="page-preview">
          <div class="page-label">Page ${p + 1}</div>
          <div class="page-grid cols-${cols}">
            ${cells.map(item => item ? `
              <div class="grid-cell" onclick="editItem('${item.library_image_id}')" style="cursor:pointer">
                <img src="${item.cell_render_url ? API + item.cell_render_url : API + (item.image ? item.image.url : '')}"
                     onerror="this.style.display='none'">
              </div>
            ` : '<div class="grid-cell empty"></div>').join('')}
          </div>
        </div>
      `;
    }

    container.innerHTML = html;
  }

  function onReorder() {
    // rebuild items array from current DOM order
    const ids = [...document.querySelectorAll('.sort-item')].map(el => el.dataset.id);
    items = ids.map((id, i) => {
      const item = items.find(it => it.id === id);
      return { ...item, position: i + 1 };
    });

    // update position numbers in list
    document.querySelectorAll('.sort-item-position').forEach((el, i) => {
      el.textContent = i + 1;
    });

    // re-render page preview
    renderPages();

    // debounced autosave
    clearTimeout(saveTimer);
    document.getElementById('save-status').textContent = 'Saving...';
    document.getElementById('save-status').className = 'save-status saving';
    saveTimer = setTimeout(saveOrder, 1500);
  }
  async function deleteItem(itemId) {
    if (!confirm('Remove this item from the project?')) return;
    await fetch(`${API}/items/${itemId}`, { method: 'DELETE' });
    items = items.filter(it => it.id !== itemId);
    renderList();
    renderPages();
  }

  function editItem(libraryImageId) {
    // store which image to jump to in the editor
    sessionStorage.setItem('edit_image_id', libraryImageId);
    window.location.href = '/static/editor.html';
  }
  async function saveOrder() {
    const positions = items.map(item => ({ id: item.id, position: item.position }));
    await fetch(`${API}/projects/${projectId}/reorder`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(positions)
    });
    document.getElementById('save-status').textContent = 'Order saved';
    document.getElementById('save-status').className = 'save-status saved';
  }

  async function switchTemplate(templateId) {
    if (!confirm('Switching templates will re-render all cells. Continue?')) {
      // revert select
      init();
      return;
    }

    await fetch(`${API}/projects/${projectId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template_id: templateId })
    });

    await fetch(`${API}/export/${projectId}/render_all`, { method: 'POST' });

    sessionStorage.setItem('template_id', templateId);
    init();
  }

  function addMoreImages() {
    window.location.href = `/static/upload.html?project_id=${projectId}`;
  }

  function continueToNext() {
    window.location.href = '/static/final.html';
  }

  init();
</script>

</body>
