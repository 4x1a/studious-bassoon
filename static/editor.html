<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Items — Flyer Maker</title>
  <style>
    @font-face {
      font-family: 'Bebas Neue';
      src: url('/static/BebasNeue-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Noto Sans SC';
      src: url('/static/NotoSansSC-SemiBold.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Noto Sans SC';
      src: url('/static/NotoSansSC-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    header a:hover { color: white; }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .progress-text {
      font-size: 14px;
      color: #aaa;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 460px;
      gap: 0;
      min-height: calc(100vh - 70px);
    }

    /* Left — form panel */
    .form-panel {
      padding: 40px;
      overflow-y: auto;
    }

    .item-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .item-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      background: #e0e0e0;
    }

    .item-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .item-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .form-section {
      margin-bottom: 28px;
    }

    .form-section-title {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .price-row {
      display: grid;
      grid-template-columns: 100px 1fr 120px;
      gap: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
    }

    input, select, textarea {
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Noto Sans SC', sans-serif;
      color: #1a1a1a;
      background: rgba(255, 255, 255, 0.75);
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e8312a;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .nudge-section {
      margin-bottom: 28px;
    }

    .nudge-grid {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 4px;
      width: fit-content;
      margin-top: 12px;
    }

    .nudge-btn {
      width: 44px;
      height: 44px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .nudge-btn:hover {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .nudge-btn.center {
      background: #f0f0eb;
      cursor: default;
      font-size: 11px;
      color: #aaa;
    }

    .nudge-amount {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }

    

    .nudge-amount select {
      width: auto;
      padding: 6px 10px;
    }

    /* Right — preview panel */
    .preview-panel {
      background: #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: sticky;
      top: 0;
      height: calc(100vh - 70px);
    }

    .preview-label {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .cell-preview {
      width: 400px;
      height: 400px;
      background: white;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .cell-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cell-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.75);
      padding: 10px 12px;
    }

    .cell-price-badge {
      position: absolute;
      bottom: 110px;
      right: 12px;
      width: 80px;
      height: 80px;
      background: #F5C518;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      line-height: 1.1;
      text-align: center;
      padding: 8px;
    }

    .cell-desc-zh {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 2px;
      text-align: center;
    }


    .cell-desc-en {
      font-size: 18px;
      color: #333;
      margin-bottom: 2px;
      text-align: center;
    }

    .cell-notes {
      font-size: 10px;
      color: #888;
      text-align: left;
    }

    .preview-hint {
      font-size: 12px;
      color: #555;
      margin-top: 16px;
      text-align: center;
    }

    /* Navigation */
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e0e0e0;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #e8312a; color: white; }
    .btn-secondary { background: #f0f0eb; color: #1a1a1a; }
    .btn-ghost { background: transparent; color: #888; border: 1.5px solid #e0e0e0; }

    .pb { padding-bottom: 80px; }

    .add-more-btn {
      font-size: 13px;
      color: #e8312a;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <a href="/static/template.html">← Back</a>
    <h1>Edit Items</h1>
  </div>
  <span class="progress-text" id="progress-text">Item 1 of ?</span>
</header>

<div class="main">

  <!-- Left: form -->
  <div class="form-panel pb">

    <div class="item-header">
      <img class="item-thumb" id="item-thumb" src="">
      <div>
        <div class="item-title" id="item-title">Loading...</div>
        <div class="item-subtitle" id="item-subtitle"></div>
      </div>
    </div>

    <!-- Price -->
    <div class="form-section">
      <div class="form-section-title">Price</div>
      <div class="price-row">
        <div class="form-group">
          <label>Prefix</label>
          <input type="text" id="price-prefix" placeholder="2 For" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="text" id="price-amount" placeholder="1.99" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select id="price-unit" onchange="updatePreview()">
            <option value="">— none —</option>
            <option value="/lb">/lb</option>
            <option value="/ea">/ea</option>
            <option value="/cs">/cs</option>
            <option value="+tax">+tax</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Descriptions -->
    <div class="form-section">
      <div class="form-section-title">Descriptions</div>
      <div class="form-group" style="margin-bottom: 12px;">
        <label>Chinese 中文</label>
        <textarea id="desc-zh" placeholder="橘子" oninput="updatePreview()"></textarea>
      </div>
      <div class="form-group">
        <label>English</label>
        <textarea id="desc-en" placeholder="Sunflavour Mandarin" oninput="updatePreview()"></textarea>
      </div>
    </div>

    <!-- Notes -->
    <div class="form-section">
      <div class="form-section-title">Notes <span style="font-weight:400;color:#bbb">(optional)</span></div>
      <div class="form-group">
        <textarea id="notes" placeholder="三磅以上不加工" oninput="updatePreview()"></textarea>
      </div>
    </div>

    <!-- Image nudge -->
    <div class="nudge-section">
      <div class="form-section-title">Adjust Image Position</div>
      <div class="nudge-grid">
        <div></div>
        <button class="nudge-btn" onclick="nudge(0, -1)">↑</button>
        <div></div>
        <button class="nudge-btn" onclick="nudge(-1, 0)">←</button>
        <div class="nudge-btn center">img</div>
        <button class="nudge-btn" onclick="nudge(1, 0)">→</button>
        <div></div>
        <button class="nudge-btn" onclick="nudge(0, 1)">↓</button>
        <div></div>
      </div>
      <div class="nudge-amount">
        Step size:
        <select id="nudge-step">
          <option value="5">5px</option>
          <option value="10" selected>10px</option>
          <option value="20">20px</option>
        </select>
      </div>

      <div class="nudge-amount" style="margin-top: 12px;">
        Image size:
        <input type="range" id="scale-slider" min="50" max="200" value="100"
          style="flex:1" oninput="updateScale(this.value)">
        <span id="scale-label" style="min-width:40px;text-align:right">100%</span>
      </div>
    </div>

  </div>

  <!-- Right: preview -->
  <div class="preview-panel">
    <div class="preview-label">Cell Preview</div>
    <div class="cell-preview" id="cell-preview">
      <img id="preview-img" src="" style="object-position: center center;">
      <div class="cell-price-badge" id="preview-badge" style="display:none">
        <span id="preview-prefix" style="font-size:12px"></span>
        <span id="preview-amount">$0.00</span>
        <span id="preview-unit" style="font-size:12px"></span>
      </div>
      <div class="cell-overlay">
        <div class="cell-desc-zh" id="preview-zh"></div>
        <div class="cell-desc-en" id="preview-en"></div>
        <div class="cell-notes" id="preview-notes"></div>
      </div>
    </div>
    <div class="preview-hint">Preview updates as you type</div>
  </div>

</div>

<div class="nav-bar">
  <div class="nav-left">
    <button class="btn btn-ghost" id="prev-btn" onclick="prevItem()">← Prev</button>
    <button class="btn btn-secondary" onclick="saveAndSkip()">Save & Skip</button>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <button class="add-more-btn" onclick="addMoreImages()">+ Add more images</button>
    <button class="btn btn-primary" id="next-btn" onclick="saveAndNext()">Save & Next →</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  const projectId = sessionStorage.getItem('project_id');
  const selectedImageIds = JSON.parse(sessionStorage.getItem('selected_image_ids') || '[]');

  let items = [];         // items already saved to DB for this project
  let imageQueue = [];    // library image objects for selected images
  let currentIndex = 0;
  let offsetX = 0;
  let offsetY = 0;

  async function init() {
    if (!projectId) {
      alert('No project found. Please start again.');
      window.location.href = '/static/index.html';
      return;
    }

    const res = await fetch(`${API}/library/`);
    const allImages = await res.json();

    // if coming from order page to edit a specific item
    const editImageId = sessionStorage.getItem('edit_image_id');
    
    if (editImageId) {
      // Coming from order page to edit — load all project items
      const itemRes = await fetch(`${API}/items/project/${projectId}`);
      items = await itemRes.json();
      // Build imageQueue from full library objects so .id is always available
      imageQueue = items.map(it => allImages.find(img => img.id === it.library_image_id) || it.image).filter(Boolean);
      // Jump to the specific item
      const jumpIndex = items.findIndex(it => it.library_image_id === editImageId);
      currentIndex = jumpIndex > -1 ? jumpIndex : 0;
      sessionStorage.removeItem('edit_image_id');
    } else {
      // Normal flow — images just selected on upload page
      if (!selectedImageIds.length) {
        alert('No images found. Please start again.');
        window.location.href = '/static/index.html';
        return;
      }
      // Full image objects (with .id) in selection order
      imageQueue = selectedImageIds
        .map(id => allImages.find(img => img.id === id))
        .filter(Boolean);
      const itemRes = await fetch(`${API}/items/project/${projectId}`);
      const existingItems = await itemRes.json();
      // Pre-fill items array indexed to match imageQueue; null = not yet created
      items = imageQueue.map(img => existingItems.find(it => it.library_image_id === img.id) || null);
    }

    updateDisplay();
  }

  function updateDisplay() {
    const total = imageQueue.length;
    const current = imageQueue[currentIndex];

    document.getElementById('progress-text').textContent = `Item ${currentIndex + 1} of ${total}`;
    document.getElementById('item-title').textContent = current.name || 'Untitled';
    document.getElementById('item-subtitle').textContent = `Image ${currentIndex + 1}`;
    document.getElementById('item-thumb').src = `${API}${current.url}`;
    document.getElementById('preview-img').src = `${API}${current.url}`;

    // match by position in items array when coming from order page
    // or by library_image_id when in normal flow
    const existing = items[currentIndex];

    if (existing) {
      document.getElementById('price-prefix').value = existing.price_prefix || '';
      document.getElementById('price-amount').value = existing.price_amount || '';
      document.getElementById('price-unit').value = existing.price_unit || '';
      document.getElementById('desc-zh').value = existing.description_zh || '';
      document.getElementById('desc-en').value = existing.description_en || '';
      document.getElementById('notes').value = existing.notes || '';
      offsetX = existing.image_offset_x || 0;
      offsetY = existing.image_offset_y || 0;
      const scale = Math.round((existing.image_scale || 1.0) * 100);
      document.getElementById('scale-slider').value = scale;
      document.getElementById('scale-label').textContent = scale + '%';
    } else {
      document.getElementById('price-prefix').value = '';
      document.getElementById('price-amount').value = '';
      document.getElementById('price-unit').value = '';
      document.getElementById('desc-zh').value = '';
      document.getElementById('desc-en').value = '';
      document.getElementById('notes').value = '';
      offsetX = 0;
      offsetY = 0;
      document.getElementById('scale-slider').value = 100;
      document.getElementById('scale-label').textContent = '100%';
    }

    updatePreview();
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').textContent =
      currentIndex === total - 1 ? 'Save & Finish →' : 'Save & Next →';
  }
  

  function updatePreview() {
    const amount = document.getElementById('price-amount').value;
    const prefix = document.getElementById('price-prefix').value;
    const unit = document.getElementById('price-unit').value;
    const zh = document.getElementById('desc-zh').value;
    const en = document.getElementById('desc-en').value;
    const notes = document.getElementById('notes').value;

    const badge = document.getElementById('preview-badge');
    if (amount) {
      badge.style.display = 'flex';
      document.getElementById('preview-prefix').textContent = prefix;
      document.getElementById('preview-amount').textContent = `$${amount}`;
      document.getElementById('preview-unit').textContent = unit;
    } else {
      badge.style.display = 'none';
    }

    document.getElementById('preview-zh').textContent = zh;
    document.getElementById('preview-en').textContent = en;
    document.getElementById('preview-notes').textContent = notes;

    // apply image offset
    const scale = document.getElementById('scale-slider').value / 100;
    const img = document.getElementById('preview-img');
    img.style.objectPosition = `calc(50% + ${offsetX}px) calc(50% + ${offsetY}px)`;
    img.style.transform = `scale(${scale})`;
    img.style.transformOrigin = 'center center';
  }
  
  function nudge(dx, dy) {
    const step = parseInt(document.getElementById('nudge-step').value);
    offsetX += dx * step;
    offsetY += dy * step;
    updatePreview();
  }
  function updateScale(val) {
  document.getElementById('scale-label').textContent = val + '%';
  updatePreview();
  }
  
  async function saveCurrentItem() {
    const existing = items[currentIndex];
    const currentImage = imageQueue[currentIndex];

    const payload = {
      price_prefix: document.getElementById('price-prefix').value || null,
      price_amount: document.getElementById('price-amount').value || null,
      price_unit: document.getElementById('price-unit').value || null,
      description_zh: document.getElementById('desc-zh').value || null,
      description_en: document.getElementById('desc-en').value || null,
      notes: document.getElementById('notes').value || null,
      image_offset_x: offsetX,
      image_offset_y: offsetY,
      image_scale: document.getElementById('scale-slider').value / 100,
    };

    if (!existing || !existing.id) {
      // Item doesn't exist yet — create it
      const res = await fetch(`${API}/items/project/${projectId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          library_image_id: currentImage.id,
          position: currentIndex + 1,
          ...payload,
        })
      });
      const created = await res.json();
      items[currentIndex] = created;
    } else {
      // Item already exists — update it
      const res = await fetch(`${API}/items/${existing.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const updated = await res.json();
      items[currentIndex] = { ...items[currentIndex], ...updated };
    }
  }


  async function saveAndNext() {
    await saveCurrentItem();
    if (currentIndex < imageQueue.length - 1) {
      currentIndex++;
      updateDisplay();
    } else {
      // all done — go to order page
      window.location.href = '/static/order.html';
    }
  }

  async function saveAndSkip() {
    await saveCurrentItem();
    if (currentIndex < imageQueue.length - 1) {
      currentIndex++;
      updateDisplay();
    } else {
      window.location.href = '/static/order.html';
    }
  }

  async function prevItem() {
    await saveCurrentItem();
    if (currentIndex > 0) {
      currentIndex--;
      updateDisplay();
    }
  }

  function addMoreImages() {
    window.location.href = `/static/upload.html?project_id=${projectId}`;
  }

  init();
</script>

</body>
</html>
